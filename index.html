<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organic Wave Design</title>
    <style>
        body {
            margin: 0;
            font-family: sans-serif;
            overflow-x: hidden; /* Prevents unwanted horizontal scrolls from SVG width */
        }

        /* Top Blue Section */
        .wave-container {
            background: #0099ff;
            color: white;
            height: 40vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative; 
        }

        .wave-container svg {
            position: absolute;
            bottom: 0;
            width: 100%;
            display: block;
        }

        /* White Middle Section */
        .content {
            padding: 100px 50px;
            background: #fff;
            text-align: center;
        }

        /* Bottom Orange Section */
     .Section {
        background: #000000; /* Let's say this section is black */
        color: white;
        min-height: 40vh;
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
        /* Padding ensures your text doesn't sit under the wave */
        padding-top: 150px; 
    }

    .Section svg {
        position: absolute;
        bottom: 0; /* Pins to the top */
        left: 0;
        width: 100%;
        height: auto;
        /* This removes the tiny gap at the bottom of the SVG */
        display: block; 
    }

        h1 {
            z-index: 2;
            position: relative;
        }
    </style>
</head>
<body>

    <div class="wave-container">
        <h1>Organic CSS Wave</h1>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320">
            <path fill="#ffffff" d="M0,224L48,213.3C96,203,192,181,288,181.3C384,181,480,203,576,224C672,245,768,267,864,250.7C960,235,1056,181,1152,165.3C1248,149,1344,171,1392,181.3L1440,192L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path>
        </svg>
    </div>

    <div class="content">
        <h2>Next Section</h2>
        <p>This section is white, so the wave above it was also white.</p>
    </div>

    <div class="Section">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="#fff" fill-opacity="1" d="M0,192L30,197.3C60,203,120,213,180,181.3C240,149,300,75,360,64C420,53,480,107,540,149.3C600,192,660,224,720,245.3C780,267,840,277,900,240C960,203,1020,117,1080,112C1140,107,1200,181,1260,224C1320,267,1380,277,1410,282.7L1440,288L1440,320L1410,320C1380,320,1320,320,1260,320C1200,320,1140,320,1080,320C1020,320,960,320,900,320C840,320,780,320,720,320C660,320,600,320,540,320C480,320,420,320,360,320C300,320,240,320,180,320C120,320,60,320,30,320L0,320Z"></path></svg>
        <h1>Next Section here</h1>
    </div>



</body>
</html>
